<!DOCTYPE html>

<style>

/* 上のチェック非表示 */
#rightInfo button{
  display:none;

/* ===================== ヘッダー土台 ===================== */
#header {
  display: flex;
  align-items: center;
  padding: 0 20px;
  box-sizing: border-box;
}

#header {
  display: flex;
  align-items: center;
  padding: 0 20px;
  box-sizing: border-box;
}

#header-left,
#header-center,
#header-right{
  display:flex;
  align-items:center;
}

#header-left{
  flex: 0 0 auto;
}

#header-center{
  flex: 1;
  justify-content: center;
}

#header-right{
  flex: 0 0 auto;
  margin-left: auto;
  justify-content: flex-end;
}

#header-left img {
  height: 40px;
  object-fit: contain;
  margin-right: 10px;  /* ←これ追加 */
}

#loading {
  opacity: 1;
  transition: opacity 0.2s ease;
}

#loading {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  opacity: 1;
  transition: opacity 0.2s ease;
  z-index: 2000;
}

#settingBtn{
  margin-left:10px;
  font-size:25px;
  border:none;
  background:none;
  cursor:pointer;
  color:#1976d2;   /* ←これが色 */
  line-height:1;
}

#settingsModal {
  display: none;
}

.setting-row{
  display:flex;
  align-items:center;
  gap:15px;
}

.setting-row .label{
  width:60px;
}

</style>
</head>

<body tabindex="0">

<div id="card">

  <!-- ===================== 上部ヘッダー ===================== -->
<div id="header" style="display:none;">

  <div id="header-left">
   <img id="headerLogo">
  </div>

  <div id="header-center">
   <span id="title"></span>
  </div>

  <div id="header-right">
  <span id="progress"></span>
   <button id="settingBtn">⚙</button>
  </div>

</div>

  <!-- ==============================
  【ロゴ】初回表示
  ============================== -->
  <div id="loading">
    <img id="logoImg" style="width:200px;">
  </div>

  <!-- ==============================
  【カード】最初は非表示
  ============================== -->
  <div id="front" style="display:none;">
    <div class="top">
      <img id="meaningFront">
    </div>
    <div class="bottom">
      <img id="jpImg" style="display:none;">
    </div>
  </div>

  <div id="back" style="display:none;">
    <div class="top">
      <img id="meaningBack">
    </div>
    <div class="bottom">
      <div id="thai"></div>
      <div id="eng"></div>
      <div id="memo"></div>
    </div>
  </div>

  <button id="speakBtn">🔊</button>

</div>

<script>
let cards = [];
let index = 0;
let isFront = true;

let skipVoice = false;
let isFirstLoad = true;
let isReady = false;

const imageCache = {};

const LOGO_FILE_ID = "1c0CEfdeVic3rjgzQcDRWa5C11yzJrl1w";

// ==============================
// URL lesson取得
// ==============================
function getLesson(){
  const params = new URLSearchParams(window.location.search);
  return params.get("lesson");
}

// ==============================
// 【画像IDチェック】空データ除外
// ==============================
function isValidId(v){
  return v && v.trim() !== "" && v !== "null";
}

// ==============================
// 【画像】キャッシュ取得
// ==============================
async function getImageCached(fileId){

  if(!fileId) return null;

  if(imageCache[fileId]){
    return imageCache[fileId];
  }

  const apiUrl =
    'https://script.google.com/macros/s/AKfycbw5uC6lwJf3LVCLPaCjfUw0DpwvsflywLcS6V2-1HaxcxUNqlf44ovlE7AHFfrEm1g/exec?image='
    + fileId;

  const response = await fetch(apiUrl);

  const imageUrl = (await response.text()).trim();

  imageCache[fileId] = imageUrl;

  return imageUrl;
}

// ==============================
// 【表示】カード描画
// ==============================
async function showCard(){

  if(!cards.length) return;

  const c = cards[index];

  const front = document.getElementById("front");
  const back  = document.getElementById("back");

  front.style.display = "none";
  back.style.display = "none";

  // =========================
  // 表
  // =========================
  if(isFront){

    const meaningFront = document.getElementById("meaningFront");
    const img = document.getElementById("jpImg");

    meaningFront.src = "";
    img.src = "";
    img.style.display = "none";

    const currentIndex = index;

    // -------------------------
    // meaning画像
    // -------------------------
    const meaningUrl = isValidId(c.meaningImg)
      ? imageCache[c.meaningImg]
      : "";

    // cache済み
    if(meaningUrl){

      meaningFront.src = meaningUrl;

    }
    // cache無し
    else if(isValidId(c.meaningImg)){

      const src = await getImageCached(c.meaningImg);

      if(currentIndex !== index) return;

      meaningFront.src = src;

    }

    // -------------------------
    // 日本語画像
    // -------------------------
    const jpUrl = isValidId(c.hiraImg)
      ? imageCache[c.hiraImg]
      : "";

    // cache済み
    if(jpUrl){

      img.src = jpUrl;
      img.style.display = "block";

    }
    // cache無し
    else if(isValidId(c.hiraImg)){

      const src = await getImageCached(c.hiraImg);

      if(currentIndex !== index) return;

      img.src = src;
      img.style.display = "block";

    }

    front.style.display = "flex";

  }

  // =========================
  // 裏
  // =========================
  else{

    const meaningBack = document.getElementById("meaningBack");
    meaningBack.src = "";

    const currentIndex = index;

    const meaningUrl = isValidId(c.meaningImg)
      ? imageCache[c.meaningImg]
      : "";

    if(meaningUrl){

      meaningBack.src = meaningUrl;

    }else if(isValidId(c.meaningImg)){

      getImageCached(c.meaningImg).then(src => {

        if(currentIndex !== index) return;

        meaningBack.src = src;

      });

    }

    const settings = getSettings();

    document.getElementById("thai").textContent = c.thai || "";
    document.getElementById("eng").textContent  = c.eng || "";

    if(settings.memo === "on"){

      document.getElementById("memo").style.display = "block";
      document.getElementById("memo").textContent = c.memo || "";

    }else{

      document.getElementById("memo").style.display = "none";

    }

    back.style.display = "flex";
  }

  // =========================
  // UI
  // =========================
  document.getElementById("progress").textContent =
    (index + 1) + "/" + cards.length +
    (isFront ? "（日本語）" : "（タイ語）");

  updateTitle();

  // =========================
  // 音声
  // =========================
  if(isFirstLoad){
    isFirstLoad = false;
  }

  const settings = getSettings();

  // 少し待って画像描画優先
  await new Promise(r => setTimeout(r, 80));

  if(settings.sound === "on" && !skipVoice){

    if(isFront){

      Voice.speakJP(cards[index].hira || "");

    }else{

      Voice.speakTH(cards[index].thai || "");

    }

  }

  skipVoice = false;

  // =========================
  // 次カード meaning画像先読み
  // =========================
  const nextIndex = (index + 1) % cards.length;

  const nextCard = cards[nextIndex];

  const nextNextIndex = (index + 2) % cards.length;

  const nextNextCard = cards[nextNextIndex];

  if(
    nextCard &&
    isValidId(nextCard.meaningImg) &&
    !imageCache[nextCard.meaningImg]
  ){
    getImageCached(nextCard.meaningImg);
  }

  // 次カード 日本語画像 先読み
  if(
    nextCard &&
    isValidId(nextCard.hiraImg) &&
    !imageCache[nextCard.hiraImg]
  ){
    getImageCached(nextCard.hiraImg);
  }

  // 2枚先 日本語画像 先読み
  if(
    nextNextCard &&
    isValidId(nextNextCard.hiraImg) &&
    !imageCache[nextNextCard.hiraImg]
  ){
    getImageCached(nextNextCard.hiraImg);
  }

}



// ==============================
// クリック
// ==============================
document.body.addEventListener("click", function(e){

  if (e.target.closest("#settingModal")) return;
  if (e.target.closest("#checkBtn")) return;
  if (e.target.closest("#settingBtn")) return;

  if(!cards.length) return;

  if(isFront){

    isFront = false;

  }else{

    index = (index + 1) % cards.length;
    isFront = true;

  }

  showCard();

});

// ==============================
// Voice Controller
// ==============================
const Voice = (function(){

  let ready = false;
  let voiceJP = null;
  let voiceTH = null;

  function init(){

    const setVoices = () => {

      const voices = speechSynthesis.getVoices();

      console.log("===== VOICES =====");

      voices.forEach(v => {
        console.log(v.name, "|", v.lang);
      });
     

      voiceJP =
        voices.find(v => v.name.includes("七海")) ||
        voices.find(v => v.lang === "ja-JP");

      voiceTH =
        voices.find(v => v.name.includes("เปรมวดี")) ||
        voices.find(v => v.lang === "th-TH");

      if(voiceJP || voiceTH){
        ready = true;
      }

    };

    setVoices();

    speechSynthesis.onvoiceschanged = setVoices;
  }

  function speakJP(text){
    speak(text, voiceJP, "ja-JP");
  }

  function speakTH(text){
    speak(text, voiceTH, "th-TH");
  }

  function speak(text, voice, lang){

    if(!ready) return;
    if(!text) return;

    speechSynthesis.getVoices();

    const uttr = new SpeechSynthesisUtterance(text);

    uttr.lang = lang;

    uttr.rate = 1;
    uttr.pitch = 1;
    uttr.volume = 1;

    if(voice){
      uttr.voice = voice;
    }

    speechSynthesis.cancel();

    setTimeout(() => {
      speechSynthesis.speak(uttr);
    }, 50);

  }

  return {
    init,
    speakJP,
    speakTH
  };

})();

// ==============================
// Voice初期化
// ==============================
window.addEventListener("load", async () => {

  Voice.init();

  await new Promise(r => setTimeout(r, 500));

});

// ==============================
// 【ロゴ】読み込み
// ==============================

// ==============================
// タイトル更新
// ==============================
function updateTitle() {

  const titleEl = document.getElementById("title");

  const card = cards[index];

  titleEl.textContent =
    `${card.title} - ${card.lesson}`;

}

// ==============================
// ヘッダーロゴ
// ==============================
function setHeaderLogo() {

  const headerLogo = document.getElementById("headerLogo");
  const logoImg = document.getElementById("logoImg");

  headerLogo.src = logoImg.src;

}

// ==============================
// 手動音声
// ==============================
function playCurrentVoice(){

  if(!cards.length) return;

  const c = cards[index];

  if(isFront){

    Voice.speakJP(c.hira || "");

  }else{

    Voice.speakTH(c.thai || "");

  }

}

// ==============================
// 音声ボタン
// ==============================
document.getElementById("speakBtn").addEventListener("click", (e) => {

  e.stopPropagation();

  playCurrentVoice();

});

// ==============================
// 設定
// ==============================
function openSettings(){

  const settings = getSettings();

  document.querySelector(
    `input[name="sound"][value="${settings.sound}"]`
  ).checked = true;

  document.querySelector(
    `input[name="memo"][value="${settings.memo}"]`
  ).checked = true;

  const orderEl = document.querySelector(
    `input[name="order"][value="${settings.order}"]`
  );

  if(orderEl) orderEl.checked = true;

  document.getElementById("settingModal").style.display = "block";

}

function closeSettings(){

  document.getElementById("settingModal").style.display = "none";

}

function saveSettings(){

  const sound =
    document.querySelector('input[name="sound"]:checked').value;

  const memo =
    document.querySelector('input[name="memo"]:checked').value;

  const order =
    document.querySelector('input[name="order"]:checked').value;

  localStorage.setItem("settings", JSON.stringify({
    sound: sound,
    memo: memo,
    order: order
  }));

  closeSettings();

}

function getSettings() {

  const settings =
    JSON.parse(localStorage.getItem("settings")) || {
      sound: "on",
      memo: "on",
      order: "normal"
    };

  document.querySelectorAll('input[name="sound"]').forEach(r => {
    r.checked = (r.value === settings.sound);
  });

  document.querySelectorAll('input[name="memo"]').forEach(r => {
    r.checked = (r.value === settings.memo);
  });

  document.querySelectorAll('input[name="order"]').forEach(r => {
    r.checked = (r.value === settings.order);
  });

  return settings;

}

document.getElementById("settingBtn").addEventListener("click", (e) => {

  e.stopPropagation();

  openSettings();

});

// =========================
// 初期起動
// =========================
async function initApp() {

  // データ取得
  const response = await fetch(
    'https://script.google.com/macros/s/AKfycbw5uC6lwJf3LVCLPaCjfUw0DpwvsflywLcS6V2-1HaxcxUNqlf44ovlE7AHFfrEm1g/exec'
  );

  const data = await response.json();

  cards = data || [];

  getSettings();

  isFront = true;

  const logoUrl = await getImageCached(LOGO_FILE_ID);

  document.getElementById("logoImg").src = logoUrl;

  setHeaderLogo();

  // =========================
  // meaning画像だけ先読み
  // =========================
  const promises = [];

  cards.slice(0, 1).forEach(c => {

    if(isValidId(c.meaningImg)){

      promises.push(
        getImageCached(c.meaningImg)
      );

    }

    if(isValidId(c.hiraImg)){

      promises.push(
        getImageCached(c.hiraImg)
      );

    }

  });

  await Promise.all(promises);

  // =========================
  // ローディング
  // =========================
  await new Promise(r => setTimeout(r, 800));

  const loading = document.getElementById("loading");
  const header  = document.getElementById("header");

  loading.style.opacity = "0";

  await new Promise(r => setTimeout(r, 200));

  loading.style.display = "none";

  header.style.display = "flex";

  document.getElementById("front").style.display = "flex";

  // 初回表示
  showCard();

  isReady = true;

  document.body.focus();
  window.focus();

  // =========================
  // キーボード
  // =========================
  document.addEventListener("keydown", function(e){

    if(!isReady) return;

    if(e.key === "Enter"){

      if(isFront){

        isFront = false;

      }else{

        isFront = true;
        index = (index + 1) % cards.length;

      }

      showCard();

    }

    if(e.key === "Backspace"){

      e.preventDefault();

      if(isFront){

        index = (index - 1 + cards.length) % cards.length;
        isFront = false;

      }else{

        isFront = true;

      }

      showCard();

    }

  });

}

initApp();
</script>

</body>
